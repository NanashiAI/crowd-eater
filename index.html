<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- ========================================== -->

    <script>

      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-NLD8XYL5YC');
    </script>

    <!-- ========================================== -->
    <!-- 2. Google AdSense 等の広告タグがあればここに -->
    <!-- ========================================== -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-あなたのID" crossorigin="anonymous"></script> -->
    <script src="https://adm.shinobi.jp/s/7da5872a5ba88c9240d976b82867b977"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CROWD EATER</title>
    <style>
        /* レイアウト全体を縦並びに調整 */
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Arial', sans-serif; touch-action: none; user-select: none;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        
        /* ゲーム画面を囲むコンテナ */
        #game-wrapper {
            position: relative;
            width: 360px;
            height: 600px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin-top: 10px;
        }

        canvas { 
            display: block; background: #0f172a; 
            border-left: 1px solid #333; border-right: 1px solid #333;
        }
        
        #ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.85); z-index: 10;
        }
        
        h1 { font-size: 40px; color: #38bdf8; font-style: italic; margin-bottom: 10px; text-shadow: 0 0 20px rgba(56,189,248,0.5); }
        p { color: #cbd5e1; margin-bottom: 30px; font-weight: bold; letter-spacing: 2px; text-align: center;}
        
        button { 
            padding: 15px 40px; font-size: 24px; font-weight: 900; 
            background: linear-gradient(to right, #2563eb, #06b6d4); color: #fff; 
            border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(37,99,235,0.5);
            margin-bottom: 20px;
        }
        button:active { transform: scale(0.95); }

        /* OFUSEボタンのスタイル */
        .ofuse-btn {
            display: inline-block;
            padding: 10px 30px; font-size: 16px; font-weight: bold;
            background: #ff5a5a; color: #fff; text-decoration: none;
            border-radius: 30px; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(255, 90, 90, 0.4);
        }
        .ofuse-btn:hover { background: #ff7b7b; transform: translateY(-2px); }

        /* 広告表示エリア（ゲーム画面の下） */
        #ad-container {
            width: 360px;
            height: 50px; /* バナー広告の高さに合わせて調整 */
            background: #222;
            margin-top: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #555; font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- ゲーム全体を囲む枠 -->
    <div id="game-wrapper">
        <canvas id="gameCanvas" width="360" height="600"></canvas>
        <div id="ui">
            <h1 id="title">CROWD EATER</h1>
            <p id="msg">無限に増やして喰い尽くせ！</p>
            <button id="startBtn">START GAME</button>
            
            <!-- ========================================== -->
            <!-- 3. OFUSEへのリンクをここに -->
            <!-- ========================================== -->
            <a href="https://ofuse.me/4af7da02" target="_blank" class="ofuse-btn">☕ OFUSEでクリエイターを支援</a>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- 4. 広告の表示領域 -->
    <!-- ========================================== -->
    <div id="ad-container">
        <!-- admax -->
        <script src="https://adm.shinobi.jp/s/7da5872a5ba88c9240d976b82867b977"></script>
        <!-- admax -->
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const startBtn = document.getElementById('startBtn');
        const titleLabel = document.getElementById('title');
        const msgLabel = document.getElementById('msg');

        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return Math.floor(num).toString();
        }

        let gameState = 'START';
        let level = 1;
        let animationId;

        const SCREEN_WIDTH = 360;
        const SCREEN_HEIGHT = 600;

        let game = {
            px: SCREEN_WIDTH / 2, py: SCREEN_HEIGHT - 120,
            power: 15, crowd:[], enemies: [], gates: [], particles:[], boss: null,
            frame: 0, speed: 3.5, distance: 0, phase: 'RUN'
        };

        function startGame(nextLevel = false) {
            // ★ イベントトラッキング（Google Analyticsにゲーム開始を送る）
            if (typeof gtag === 'function') {
                gtag('event', 'game_start', { 'level': nextLevel ? level + 1 : 1 });
            }

            if (!nextLevel) level = 1;
            else level++;

            game = {
                px: SCREEN_WIDTH / 2, py: SCREEN_HEIGHT - 120,
                power: 15, crowd:[], enemies:[], gates: [], particles:[], boss: null,
                frame: 0, speed: 3.5, distance: 0, phase: 'RUN'
            };
            
            gameState = 'PLAYING';
            ui.style.display = 'none';
            if (animationId) cancelAnimationFrame(animationId);
            loop();
        }

        startBtn.addEventListener('click', () => {
            const isClear = msgLabel.innerText === 'LEVEL CLEAR!';
            startGame(isClear);
        });

        function gameOver(msg) {
            // ★ イベントトラッキング（クリアかゲームオーバーを送る）
            if (typeof gtag === 'function') {
                gtag('event', msg === 'LEVEL CLEAR!' ? 'level_clear' : 'game_over', { 'level': level, 'score': game.power });
            }

            gameState = 'GAMEOVER';
            ui.style.display = 'flex';
            msgLabel.innerText = msg;
            startBtn.innerText = msg === 'LEVEL CLEAR!' ? 'NEXT LEVEL' : 'RETRY';
        }

        function loop() {
            if (gameState !== 'PLAYING') return;
            game.frame++;

            const visualTarget = Math.min(300, Math.ceil(game.power));
            while (game.crowd.length < visualTarget) {
                game.crowd.push({ x: game.px + (Math.random() - 0.5) * 50, y: game.py + (Math.random() - 0.5) * 50, vx: 0, vy: 0 });
            }
            while (game.crowd.length > visualTarget) game.crowd.pop();

            if (game.phase === 'RUN') {
                game.distance += game.speed;
                const goalDist = 3000 + level * 800;
                if (game.distance > goalDist) {
                    game.phase = 'BOSS';
                    const bossHp = 500 * Math.pow(2.2, level - 1);
                    game.boss = { x: SCREEN_WIDTH / 2, y: -100, hp: bossHp, maxHp: bossHp, size: 70 };
                    game.enemies = []; game.gates =[];
                }
            } else if (game.phase === 'BOSS') {
                if (game.boss.y < 150) game.boss.y += 2;
            }

            const crowdRadius = Math.max(15, Math.sqrt(game.crowd.length) * 4);
            game.crowd.forEach((m, i) => {
                const angle = i * 0.618033 * Math.PI * 2;
                const dist = Math.sqrt(i) * 3.5;
                let targetX = game.px + Math.cos(angle) * dist;
                let targetY = game.py + Math.sin(angle) * dist;

                if (game.phase === 'BOSS' && game.boss && game.boss.y >= 150) {
                    targetX = game.boss.x + (Math.random() - 0.5) * game.boss.size * 1.8;
                    targetY = game.boss.y + (Math.random() - 0.5) * game.boss.size * 1.8;
                }

                m.vx = (targetX - m.x) * 0.2; m.vy = (targetY - m.y) * 0.2;
                m.x += m.vx; m.y += m.vy;
            });

            if (game.phase === 'RUN') {
                game.gates.forEach(gate => gate.y += game.speed);
                game.enemies.forEach(e => {
                    e.y += game.speed * 0.5;
                    const eVisTarget = Math.min(100, Math.ceil(e.power));
                    while (e.members.length < eVisTarget) e.members.push({ x: (Math.random()-0.5)*40, y: (Math.random()-0.5)*40 });
                    while (e.members.length > eVisTarget) e.members.pop();
                    e.members.forEach(m => { m.x += (Math.random()-0.5)*2; m.y += (Math.random()-0.5)*2; });
                });
            }

            game.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.05; });
            game.particles = game.particles.filter(p => p.life > 0);

            if (game.phase === 'RUN') {
                if (game.frame % 150 === 0) {
                    const valAdd = Math.floor(10 * Math.pow(1.5, level));
                    const multVal = 2 + (level % 2);
                    game.gates.push({
                        y: -100, passed: false,
                        left: { type: Math.random()>0.5?'ADD':'MULT', val: Math.random()>0.5 ? valAdd : multVal },
                        right: { type: Math.random()>0.5?'ADD':'MULT', val: Math.random()>0.5 ? valAdd : multVal }
                    });
                }
                if (game.frame % 180 === 90) {
                    const ePower = Math.floor((20 + Math.random() * 50) * Math.pow(1.5, level - 1));
                    game.enemies.push({ x: SCREEN_WIDTH*(0.2+Math.random()*0.6), y: -100, power: ePower, initialPower: ePower, members:[] });
                }
            }

            game.gates.forEach(gate => {
                if (!gate.passed && gate.y > game.py - 20) {
                    gate.passed = true;
                    const isLeft = game.px < SCREEN_WIDTH / 2;
                    const panel = isLeft ? gate.left : gate.right;
                    if (panel.type === 'ADD') game.power += panel.val;
                    if (panel.type === 'MULT') game.power *= panel.val;
                }
            });

            game.enemies = game.enemies.filter(e => {
                const dist = Math.hypot(game.px - e.x, game.py - e.y);
                const hitRadius = crowdRadius + Math.max(15, Math.sqrt(e.members.length)*4) + 10;
                
                if (dist < hitRadius) {
                    const drain = Math.max(1, Math.min(e.power, game.power) * 0.03);
                    e.power -= drain;
                    game.power -= drain;

                    if (game.frame % 2 === 0) {
                        game.particles.push({x: game.px+(e.x-game.px)*0.5+(Math.random()-0.5)*30, y: game.py+(e.y-game.py)*0.5+(Math.random()-0.5)*30, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1, color: Math.random()>0.5?'#ef4444':'#3b82f6'});
                    }

                    if (e.power <= 0) {
                        game.power += e.initialPower;
                        for(let i=0; i<30; i++) game.particles.push({x: e.x, y: e.y, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, life:1.5, color:'#0ea5e9'});
                        return false;
                    }
                }
                return e.y < SCREEN_HEIGHT + 50;
            });

            if (game.phase === 'BOSS' && game.boss && game.boss.y >= 150) {
                if (game.power > 0 && game.boss.hp > 0) {
                    const bossDrain = Math.max(1, Math.min(game.boss.hp, game.power) * 0.02);
                    game.boss.hp -= bossDrain;
                    game.power -= bossDrain;

                    if (game.frame % 2 === 0) {
                        game.particles.push({x: game.boss.x+(Math.random()-0.5)*60, y: game.boss.y+(Math.random()-0.5)*60, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, life:1, color:'#fbbf24'});
                    }
                }

                if (game.boss.hp <= 0) {
                    gameOver('LEVEL CLEAR!');
                } else if (game.power <= 0) {
                    gameOver('GAME OVER');
                }
            }

            if (game.power <= 0 && game.phase !== 'BOSS') gameOver('GAME OVER');

            ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
            
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2;
            const offset = (game.distance) % 40;
            for (let y = offset - 40; y < SCREEN_HEIGHT; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(SCREEN_WIDTH, y); ctx.stroke(); }

            game.gates.forEach(gate => {
                ctx.globalAlpha = gate.passed ? 0.2 : 0.8;
                ctx.fillStyle = gate.left.type === 'ADD' ? '#0ea5e9' : '#8b5cf6';
                ctx.fillRect(0, gate.y-30, SCREEN_WIDTH/2-2, 60);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(gate.left.type==='ADD'?`+${formatNumber(gate.left.val)}`:`x${gate.left.val}`, SCREEN_WIDTH*0.25, gate.y+8);
                
                ctx.fillStyle = gate.right.type === 'ADD' ? '#0ea5e9' : '#8b5cf6';
                ctx.fillRect(SCREEN_WIDTH/2+2, gate.y-30, SCREEN_WIDTH/2-2, 60);
                ctx.fillStyle = '#fff'; ctx.fillText(gate.right.type==='ADD'?`+${formatNumber(gate.right.val)}`:`x${gate.right.val}`, SCREEN_WIDTH*0.75, gate.y+8);
                ctx.globalAlpha = 1.0;
            });

            if (game.boss) {
                ctx.fillStyle = '#b91c1c'; ctx.beginPath(); ctx.arc(game.boss.x, game.boss.y, game.boss.size, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(game.boss.x-25, game.boss.y-15, 10, 0, Math.PI*2); ctx.arc(game.boss.x+25, game.boss.y-15, 10, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#333'; ctx.fillRect(game.boss.x-60, game.boss.y-90, 120, 12);
                ctx.fillStyle = '#22c55e'; ctx.fillRect(game.boss.x-60, game.boss.y-90, 120 * (Math.max(0, game.boss.hp)/game.boss.maxHp), 12);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.fillText(`BOSS: ${formatNumber(game.boss.hp)}`, game.boss.x, game.boss.y-100);
            }

            ctx.fillStyle = '#ef4444';
            game.enemies.forEach(e => {
                e.members.forEach(m => { ctx.fillRect(e.x+m.x - 2, e.y+m.y - 2, 4, 4); });
                ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif'; ctx.fillText(formatNumber(e.power), e.x, e.y - Math.max(15, Math.sqrt(e.members.length)*4) - 5);
                ctx.fillStyle = '#ef4444';
            });

            ctx.fillStyle = '#3b82f6';
            game.crowd.forEach(m => { ctx.fillRect(m.x - 2, m.y - 2, 4, 4); });
            ctx.fillStyle = '#fff'; ctx.font = 'bold 28px sans-serif'; 
            ctx.fillText(formatNumber(game.power), game.px, game.py - crowdRadius - 15);

            ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'left';
            ctx.fillText(`LEVEL ${level}`, 10, 30);
            if(game.phase === 'RUN') {
                const goalDist = 3000 + level * 800;
                const progress = Math.min(100, Math.floor((game.distance / goalDist) * 100));
                ctx.fillRect(10, 40, 100 * (progress/100), 5);
                ctx.fillStyle = '#475569'; ctx.fillRect(10 + 100*(progress/100), 40, 100 - 100*(progress/100), 5);
            }

            game.particles.forEach(p => { ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.fillRect(p.x, p.y, 4, 4); });
            ctx.globalAlpha = 1.0;

            animationId = requestAnimationFrame(loop);
        }

        function handleInput(e) {
            if (gameState !== 'PLAYING' || game.phase === 'BOSS') return;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const scaleX = canvas.width / rect.width;
            const targetX = (clientX - rect.left) * scaleX;
            
            game.px += (targetX - game.px) * 0.4;
            game.px = Math.max(30, Math.min(SCREEN_WIDTH - 30, game.px));
        }

        canvas.addEventListener('mousemove', handleInput);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleInput(e); }, { passive: false });

    </script>
</body>
</html>
